    <circle cx="400" cy="100" r="200" fill="#2ECC71" opacity="0.6" /> <!-- Mộc góc trên -->
    <circle cx="100" cy="400" r="250" fill="#FF8C42" opacity="0.8" /> <!-- Hỏa cam -->
    <circle cx="450" cy="450" r="150" fill="#FF007F" opacity="0.5" /> <!-- Hỏa hồng neon -->
  </g>

  <!-- Logo VandY trắng tinh khiết -->
  <g fill="white">
    <path d="M120 220 C100 180, 180 150, 210 200 L240 320 L270 200 C300 150, 380 180, 360 220 L330 310 Q310 340, 240 340 Q170 340, 150 310 Z" />
